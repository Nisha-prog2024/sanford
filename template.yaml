AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Simplified SAM template for Sanford and Accounting APIs.

Globals:
  Function:
    Runtime: nodejs24.x
    MemorySize: 128
    Timeout: 10
    Architectures: [x86_64]
    Handler: index.handler

Resources:
  # --- API Definitions ---
  AccountingApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            { Location: ./sanford_accounting-prod-oas30-apigateway.yaml }

      Auth:
        DefaultAuthorizer: AccountingAuthorizer
        Authorizers:
          AccountingAuthorizer:
            FunctionArn: !GetAtt AccountingAuthFn.Arn
            Identity:
              ReauthorizeEvery: 0

  DavSanfordApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: sanford
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters: { Location: ./dav_sanford-sanford-oas30-apigateway.yaml }

      Auth:
        DefaultAuthorizer: SanfordAuthorizer
        Authorizers:
          SanfordAuthorizer:
            FunctionArn: !GetAtt SanfordAuthFn.Arn
            Identity:
              ReauthorizeEvery: 0

  # --- Authorizers ---
  AccountingAuthFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: accounting_authorizer
      CodeUri: ./src

  SanfordAuthFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sanford_authorizer
      CodeUri: ./src

  # --- 1. Accounting API Functions (Example 20+ total) ---
